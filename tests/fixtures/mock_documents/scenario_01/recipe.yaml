# 场景一 Recipe（管道公式版本 v2）
# 固定计价，单元素 Cu，品位扣减 1%
# 数量公式：干重 × (cu_pct - 1) / 100

contract_id: "mock-contract-001"
version: "2.0"

elements:
  - name: "Cu"
    type: "element"
    quantity_pipeline:
      - op: "dry_weight"          # 湿重 × (1 - h2o/100)
      - op: "grade_adjust"        # × cu_pct ÷ 100
        field: "cu_pct"
        unit: "pct"               # 单位：%
    price_pipeline:
      - op: "fixed"
        value: "65000"
    unit: "元/金属吨"

assay_fee: "2000.00"
