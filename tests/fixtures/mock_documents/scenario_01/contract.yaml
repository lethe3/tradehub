# 场景一：固定计价，单元素 Cu（铜精矿采购合同）
# 对应 core/models/pricing.py → ContractPricing

contract_id: "mock-contract-001"
contract_number: "HT-2025-001"
direction: "采购"
commodity: "铜精矿"
counterparty: "某铜矿供应商"
signing_date: "2025-01-15"
tax_included: false
freight_bearer: "对方"
assay_fee_bearer: "我方"
pricing_elements: ["Cu"]
settlement_ticket_rule: "收货方磅单"
settlement_assay_rule: "双方平均化验"

# 计价规则（用于 core/models/pricing.py → ContractPricing）
pricing:
  dry_weight_formula: "wet * (1 - h2o)"  # 干重 = 湿重 × (1 - 水分%)
  pricing_elements:
    - element: "Cu"
      price_source_type: "fixed"      # 轴一：合同固定价
      base_price: 65000               # 元/金属吨
      unit: "元/金属吨"
      formula_type: "fixed_price"
  impurity_deductions: []
  assay_fee_total: 2000.00            # 化验费（我方承担，从货款中扣）
