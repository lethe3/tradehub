# 场景二预期资金流水（手算验证）
# 合同：固定计价，单元素 Cu + As 杂质扣款阶梯

# ── 元素货款 ────────────────────────────────────────────────

# S2601（Cu）
#   湿重 50.000 t，H2O 10%
#   干重 = 50.000 × 0.90 = 45.0000 t
#   金属量 = 45.0000 × (18.50 - 1.0) / 100 = 45.0000 × 0.1750 = 7.8750 → 7.875 t
#   货款 = 7.875 × 65000 = 511,875.00 元

# S2602（Cu）
#   湿重 45.000 t，H2O 11%
#   干重 = 45.000 × 0.89 = 40.0500 t
#   金属量 = 40.0500 × (19.20 - 1.0) / 100 = 40.0500 × 0.1820 = 7.2891 → 7.289 t
#   货款 = 7.289 × 65000 = 473,785.00 元

# S2603（Cu）
#   湿重 30.000 t，H2O 9%
#   干重 = 30.000 × 0.91 = 27.3000 t
#   金属量 = 27.3000 × (17.80 - 1.0) / 100 = 27.3000 × 0.1680 = 4.5864 → 4.586 t
#   货款 = 4.586 × 65000 = 298,090.00 元

# ── 杂质扣款（As）───────────────────────────────────────────

# S2601：As = 0.40%，落第一档 [0.3%, 0.5%) → 50.000 × 20 = 1,000.00 元
# S2602：As = 0.55%，落第二档 [0.5%, ∞)  → 45.000 × 50 = 2,250.00 元
# S2603：As = 0.20%，低于下限 0.30%     → 不扣款

# ── 汇总 ──────────────────────────────────────────────────
# Cu 货款合计 = 541125.00 + 499850.00 + 315835.00 = 1,356,810.00（无扣减）
# 杂质扣款合计 = 1,000.00 + 2,250.00 = 3,250.00
# 总支出 = 1,356,810.00 + 3,250.00 = 1,360,060.00

element_payments:
  - sample_id: "S2601"
    element: "Cu"
    dry_weight: "45.0000"
    metal_quantity: "8.325"
    unit_price: "65000"
    amount: "541125.00"

  - sample_id: "S2602"
    element: "Cu"
    dry_weight: "40.0500"
    metal_quantity: "7.690"
    unit_price: "65000"
    amount: "499850.00"

  - sample_id: "S2603"
    element: "Cu"
    dry_weight: "27.3000"
    metal_quantity: "4.859"
    unit_price: "65000"
    amount: "315835.00"

impurity_deductions:
  - sample_id: "S2601"
    element: "As"
    amount: "1000.00"

  - sample_id: "S2602"
    element: "As"
    amount: "2250.00"

summary:
