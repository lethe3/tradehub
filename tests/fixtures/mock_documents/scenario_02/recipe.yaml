# 场景二 Recipe（管道公式版本 v2）
# 固定计价，Cu + As 杂质扣款两档阶梯

contract_id: "mock-contract-002"
version: "2.0"

elements:
  # Cu 计价元素
  - name: "Cu"
    type: "element"
    quantity_pipeline:
      - op: "dry_weight"
      - op: "grade_adjust"
        field: "cu_pct"
        unit: "pct"
    price_pipeline:
      - op: "fixed"
        value: "65000"
    unit: "元/金属吨"

  # As 杂质扣款（类型为 deduction）
  - name: "As"
    type: "deduction"
    quantity_pipeline:
      - op: "start"
        operand: "wet_weight"      # 杂质扣款按湿重计算
    price_pipeline:
      - op: "tier_lookup"
        field: "as_pct"
        tiers:
          - lower: "0.30"
            upper: "0.50"
            rate: "20"
          - lower: "0.50"
            upper: null
            rate: "50"
    unit: "元/吨"

assay_fee: null
